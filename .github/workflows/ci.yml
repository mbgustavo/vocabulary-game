name: CI - Test & Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install Lefthook
        run: npm install -g @evilmartians/lefthook

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Lefthook
        run: lefthook run pre-commit --all-files

      - name: Analyze Code
        run: flutter analyze

  test:
    name: Test
    needs: [code-quality]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

  integration-test:
    name: Integration Tests
    needs: [code-quality]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            pkg-config \
            cmake \
            ninja-build \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev \
            xvfb

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Enable Linux
        run: flutter config --enable-linux-desktop

      - name: Run Integration Tests
        run: xvfb-run flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart -d linux

  build:
    name: Debug Build
    needs: [test, integration-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Build App Bundle
        run: flutter build appbundle --debug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-builds
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/bundle/debug/app-debug.aab