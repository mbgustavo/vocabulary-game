# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    gen-l10n:
      priority: 1
      glob: "lib/l10n/*.arb"
      run: flutter gen-l10n
      stage_fixed: true

    format:
      priority: 2
      glob:
        - "lib/**/*.dart"
        - "test/**/*.dart"
        - "integration_test/**/*.dart"
        - "test_driver/**/*.dart"
      run: dart format {staged_files}
      stage_fixed: true

    lint:
      priority: 3
      glob:
        - "lib/**/*.dart"
        - "test/**/*.dart"
        - "integration_test/**/*.dart"
        - "test_driver/**/*.dart"
      run: flutter analyze
